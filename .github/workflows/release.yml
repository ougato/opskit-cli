name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  notify-start:
    name: notify build start
    runs-on: ubuntu-latest
    steps:
      - name: send build-notify
        continue-on-error: true
        env:
          HOOK_URL: ${{ secrets.HOOK_URL }}
          HOOK_SECRET: ${{ secrets.HOOK_SECRET }}
        run: |
          curl -fsSL -X POST "${HOOK_URL}/build-notify" \
            -H "X-Hook-Secret: ${HOOK_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"event":"build_start"}'
          echo "[hook] build-notify sent"

  test:
    needs: [notify-start]
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: install deps
        run: pip install -r requirements.txt pytest-timeout

      - name: run tests
        run: python -m pytest tests/ -v --tb=short --timeout=30

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: opskit-linux-x64
            manylinux: true
          - os: ubuntu-22.04-arm
            artifact: opskit-linux-arm64
            manylinux: false
          - os: windows-latest
            artifact: opskit-windows-x64
            manylinux: false
          - os: macos-latest
            artifact: opskit-darwin-arm64
            manylinux: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        if: ${{ !matrix.manylinux }}
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: install UPX (linux non-manylinux)
        if: runner.os == 'Linux' && !matrix.manylinux
        run: sudo apt-get install -y upx-ucl

      - name: install UPX (macos)
        if: runner.os == 'macOS'
        run: brew install upx

      - name: install UPX (windows)
        if: runner.os == 'Windows'
        run: choco install upx -y

      - name: install deps (non-manylinux)
        if: ${{ !matrix.manylinux }}
        run: pip install -r requirements.txt nuitka zstandard

      - name: build (manylinux container — glibc 2.17 compatible)
        if: ${{ matrix.manylinux }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -c "
              set -e
              cd /opt/_internal && tar xf static-libs-for-embedding-only.tar.xz && cd /work
              yum install -y upx
              /opt/python/cp312-cp312/bin/pip install -r requirements.txt nuitka zstandard
              /opt/python/cp312-cp312/bin/python build.py build --backend nuitka --upx
            "

      - name: build (non-manylinux)
        if: ${{ !matrix.manylinux }}
        run: python build.py build --backend nuitka --upx

      - name: smoke test (unix)
        if: runner.os != 'Windows'
        run: |
          bin=$(ls dist/opskit-* | grep -v '\.sha256' | head -1)
          chmod +x "$bin"
          "$bin" --version

      - name: smoke test (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = Get-ChildItem dist\opskit-*.exe | Select-Object -First 1
          & $bin.FullName --version

      - name: upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts/

      - name: create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "${TAG}" --title "${TAG}" --notes "" 2>/dev/null || true
          for f in artifacts/*/opskit-*; do
            [ -f "$f" ] || continue
            echo "[gh] uploading $(basename $f)"
            gh release upload "${TAG}" "$f" --clobber
          done
          for script in install.sh install.ps1; do
            [ -f "$script" ] || continue
            echo "[gh] uploading $script"
            gh release upload "${TAG}" "$script" --clobber
          done

      - name: generate SHA256 checksums
        run: |
          for f in artifacts/*/opskit-*; do
            [ -f "$f" ] || continue
            [[ "$f" == *.sha256 ]] && continue
            sha256sum "$f" | awk '{print $1, $2}'
          done

      - name: trigger artifact pull
        continue-on-error: true
        env:
          HOOK_URL: ${{ secrets.HOOK_URL }}
          HOOK_SECRET: ${{ secrets.HOOK_SECRET }}
        run: |
          curl -fsSL -X POST "${HOOK_URL}/artifact-pull" \
            -H "X-Hook-Secret: ${HOOK_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"event":"release_sync"}'
          echo "[hook] artifact-pull triggered"
