name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: install deps
        run: pip install -r requirements.txt pytest-timeout

      - name: run tests
        run: python -m pytest tests/ -v --tb=short --timeout=30

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: opskit-linux-x64
          - os: ubuntu-22.04-arm
            artifact: opskit-linux-arm64
          - os: windows-latest
            artifact: opskit-windows-x64
          - os: macos-latest
            artifact: opskit-darwin-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: install UPX (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y upx-ucl

      - name: install UPX (macos)
        if: runner.os == 'macOS'
        run: brew install upx

      - name: install UPX (windows)
        if: runner.os == 'Windows'
        run: choco install upx -y

      - name: install deps
        run: pip install -r requirements.txt nuitka zstandard

      - name: build
        run: python build.py build --backend nuitka --upx

      - name: smoke test (unix)
        if: runner.os != 'Windows'
        run: |
          bin=$(ls dist/opskit-* | grep -v '\.sha256' | head -1)
          chmod +x "$bin"
          "$bin" --version

      - name: smoke test (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = Get-ChildItem dist\opskit-*.exe | Select-Object -First 1
          & $bin.FullName --version

      - name: upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: dist/

      - name: upload to FileBrowser (linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          FB_URL: ${{ secrets.FB_URL }}
          FB_USER: ${{ secrets.FB_USER }}
          FB_PASS: ${{ secrets.FB_PASS }}
        run: |
          TOKEN=$(curl -s -X POST "${FB_URL}/api/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${FB_USER}\",\"password\":\"${FB_PASS}\"}")
          for f in dist/opskit-*; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            echo "[upload] $name"
            curl -s -X PUT "${FB_URL}/api/resources/mirror/soft/linux/${name}?override=true" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$f"
          done

      - name: upload to FileBrowser (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          FB_URL: ${{ secrets.FB_URL }}
          FB_USER: ${{ secrets.FB_USER }}
          FB_PASS: ${{ secrets.FB_PASS }}
        run: |
          $body = '{"username":"' + $env:FB_USER + '","password":"' + $env:FB_PASS + '"}'
          $token = Invoke-RestMethod -Method POST -Uri "$env:FB_URL/api/login" `
            -ContentType "application/json" -Body $body
          Get-ChildItem dist\opskit-* | ForEach-Object {
            $name = $_.Name
            Write-Host "[upload] $name"
            $bytes = [System.IO.File]::ReadAllBytes($_.FullName)
            Invoke-RestMethod -Method PUT `
              -Uri "$env:FB_URL/api/resources/mirror/soft/windows/$name?override=true" `
              -Headers @{ Authorization = "Bearer $token" } `
              -ContentType "application/octet-stream" `
              -Body $bytes
          }

      - name: upload to FileBrowser (macos)
        if: runner.os == 'macOS'
        shell: bash
        env:
          FB_URL: ${{ secrets.FB_URL }}
          FB_USER: ${{ secrets.FB_USER }}
          FB_PASS: ${{ secrets.FB_PASS }}
        run: |
          TOKEN=$(curl -s -X POST "${FB_URL}/api/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${FB_USER}\",\"password\":\"${FB_PASS}\"}")
          for f in dist/opskit-*; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            echo "[upload] $name"
            curl -s -X PUT "${FB_URL}/api/resources/mirror/soft/macos/${name}?override=true" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$f"
          done

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts/

      - name: generate SHA256 checksums
        run: |
          for f in artifacts/*/opskit-*; do
            [ -f "$f" ] || continue
            [[ "$f" == *.sha256 ]] && continue
            sha256sum "$f" | awk '{print $1, $2}'
          done
