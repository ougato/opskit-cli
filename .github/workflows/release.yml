name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  notify-start:
    name: notify build start
    runs-on: ubuntu-latest
    steps:
      - name: send build-notify
        continue-on-error: true
        env:
          HOOK_URL: ${{ secrets.HOOK_URL }}
          HOOK_SECRET: ${{ secrets.HOOK_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${HOOK_URL:-}" ]; then echo "::error::HOOK_URL secret is empty or not set"; exit 1; fi
          if [ -z "${HOOK_SECRET:-}" ]; then echo "::error::HOOK_SECRET secret is empty or not set (server will return 401)"; exit 1; fi
          HOOK_URL="${HOOK_URL%/}"
          # hook 服务要求 X-Hook-Secret = hex(HMAC-SHA256(HOOK_SECRET, 原始 body))，不能传密钥原文
          BODY='{"event":"build_start"}'
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$HOOK_SECRET" -binary | xxd -p | tr -d '\n')
          curl -fsSL -X POST "${HOOK_URL}/build-notify" \
            -H "X-Hook-Secret: ${SIG}" \
            -H "Content-Type: application/json" \
            --data-binary "$BODY"
          echo "[hook] build-notify sent"

  test:
    needs: [notify-start]
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: install deps
        run: pip install -r requirements.txt pytest-timeout

      - name: sync version from tag
        run: python scripts/release_bump.py "${GITHUB_REF_NAME}"

      - name: run tests
        run: python -m pytest tests/ -v --tb=short --timeout=30

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: opskit-linux-x64
            manylinux: true
          - os: ubuntu-22.04-arm
            artifact: opskit-linux-arm64
            manylinux: false
          - os: windows-latest
            artifact: opskit-windows-x64
            manylinux: false
          - os: macos-latest
            artifact: opskit-darwin-arm64
            manylinux: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      # tag → APP_VERSION / bootstrap，确保编译进二进制的自报版本与 tag 一致（防版本漂移导致更新自锁）
      - name: sync version from tag
        shell: python
        run: |
            import os, subprocess, sys
            sys.exit(subprocess.call([sys.executable, "scripts/release_bump.py", os.environ["GITHUB_REF_NAME"]]))

      - uses: actions/setup-python@v5
        if: ${{ !matrix.manylinux }}
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: install deps (non-manylinux)
        if: ${{ !matrix.manylinux }}
        run: pip install -r requirements.txt nuitka zstandard

      - name: build (manylinux container — glibc 2.17 compatible)
        if: ${{ matrix.manylinux }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -c "
              set -e
              cd /opt/_internal && tar xf static-libs-for-embedding-only.tar.xz && cd /work
              /opt/python/cp312-cp312/bin/pip install -r requirements.txt nuitka zstandard
              /opt/python/cp312-cp312/bin/python build.py build --backend nuitka
              chown -R \$(stat -c '%u:%g' /work) /work/dist/
            "

      - name: build (non-manylinux)
        if: ${{ !matrix.manylinux }}
        run: python build.py build --backend nuitka

      - name: smoke test (unix)
        if: runner.os != 'Windows'
        run: |
          bin=$(ls dist/opskit-* | grep -v '\.sha256' | head -1)
          chmod +x "$bin"
          "$bin" --version

      - name: smoke test (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = Get-ChildItem dist\opskit-*.exe | Select-Object -First 1
          & $bin.FullName --version

      - name: upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts/

      - name: create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "${TAG}" --title "${TAG}" --notes "" 2>/dev/null || true
          for f in artifacts/*/opskit-*; do
            [ -f "$f" ] || continue
            echo "[gh] uploading $(basename $f)"
            gh release upload "${TAG}" "$f" --clobber
          done

      - name: generate SHA256 checksums
        run: |
          for f in artifacts/*/opskit-*; do
            [ -f "$f" ] || continue
            [[ "$f" == *.sha256 ]] && continue
            sha256sum "$f" | awk '{print $1, $2}'
          done

      # 发布控制面：把 tag 对应的 build 写回默认分支的 constants.py + bootstrap.json，
      # 客户端经 raw.githubusercontent/<default>/bootstrap.json 即可发现新版本
      - name: publish bootstrap manifest
        run: |
          set -euo pipefail
          python scripts/release_bump.py "${GITHUB_REF_NAME}"
          python scripts/release_bump.py "${GITHUB_REF_NAME}" --check
          if git diff --quiet -- core/constants.py bootstrap.json; then
            echo "[bootstrap] 无变更，跳过提交"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add core/constants.py bootstrap.json
          git commit -m "chore(release): bump to ${GITHUB_REF_NAME} [skip ci]"
          git push origin HEAD:"${{ github.event.repository.default_branch }}"
