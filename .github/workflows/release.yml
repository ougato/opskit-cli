name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: install deps
        run: pip install -r requirements.txt pytest-timeout

      - name: run tests
        run: python -m pytest tests/ -v --tb=short --timeout=30

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: opskit-linux-x64
          - os: ubuntu-22.04-arm
            artifact: opskit-linux-arm64
          - os: windows-latest
            artifact: opskit-windows-x64
          - os: macos-latest
            artifact: opskit-darwin-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: install UPX (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y upx-ucl

      - name: install UPX (macos)
        if: runner.os == 'macOS'
        run: brew install upx

      - name: install UPX (windows)
        if: runner.os == 'Windows'
        run: choco install upx -y

      - name: install deps
        run: pip install -r requirements.txt nuitka zstandard

      - name: build
        run: python build.py build --backend nuitka --upx

      - name: smoke test (unix)
        if: runner.os != 'Windows'
        run: |
          bin=$(ls dist/opskit-* | grep -v '\.sha256' | head -1)
          chmod +x "$bin"
          "$bin" --version

      - name: smoke test (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = Get-ChildItem dist\opskit-*.exe | Select-Object -First 1
          & $bin.FullName --version

      - name: upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: dist/

      - name: upload to Alist (linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          ALIST_URL: ${{ secrets.ALIST_URL }}
          ALIST_USER: ${{ secrets.ALIST_USER }}
          ALIST_PASS: ${{ secrets.ALIST_PASS }}
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash -s -- --no-superuser 2>/dev/null || sudo apt-get install -y rclone
          RCLONE_OBSCURE=$(rclone obscure "${ALIST_PASS}")
          rclone copy dist/ \
            --webdav-url "${ALIST_URL}/dav" \
            --webdav-vendor alist \
            --webdav-user "${ALIST_USER}" \
            --webdav-pass "${RCLONE_OBSCURE}" \
            :webdav:mirror/soft/linux/ \
            --transfers 4 --progress
          echo "[rclone] linux upload done"

      - name: upload to Alist (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ALIST_URL: ${{ secrets.ALIST_URL }}
          ALIST_USER: ${{ secrets.ALIST_USER }}
          ALIST_PASS: ${{ secrets.ALIST_PASS }}
        run: |
          choco install rclone -y --no-progress
          $obscure = rclone obscure "$env:ALIST_PASS"
          rclone copy dist/ `
            --webdav-url "$env:ALIST_URL/dav" `
            --webdav-vendor alist `
            --webdav-user "$env:ALIST_USER" `
            --webdav-pass "$obscure" `
            ":webdav:mirror/soft/windows/" `
            --transfers 4 --progress
          Write-Host "[rclone] windows upload done"

      - name: upload to Alist (macos)
        if: runner.os == 'macOS'
        shell: bash
        env:
          ALIST_URL: ${{ secrets.ALIST_URL }}
          ALIST_USER: ${{ secrets.ALIST_USER }}
          ALIST_PASS: ${{ secrets.ALIST_PASS }}
        run: |
          brew install rclone
          RCLONE_OBSCURE=$(rclone obscure "${ALIST_PASS}")
          rclone copy dist/ \
            --webdav-url "${ALIST_URL}/dav" \
            --webdav-vendor alist \
            --webdav-user "${ALIST_USER}" \
            --webdav-pass "${RCLONE_OBSCURE}" \
            :webdav:mirror/soft/macos/ \
            --transfers 4 --progress
          echo "[rclone] macos upload done"

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts/

      - name: upload install scripts to Alist
        env:
          ALIST_URL: ${{ secrets.ALIST_URL }}
          ALIST_USER: ${{ secrets.ALIST_USER }}
          ALIST_PASS: ${{ secrets.ALIST_PASS }}
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash -s -- --no-superuser 2>/dev/null || sudo apt-get install -y rclone
          RCLONE_OBSCURE=$(rclone obscure "${ALIST_PASS}")
          cp install.sh /tmp/opskit.sh
          cp install.ps1 /tmp/opskit.ps1 2>/dev/null || true
          rclone copy /tmp/ \
            --webdav-url "${ALIST_URL}/dav" \
            --webdav-vendor alist \
            --webdav-user "${ALIST_USER}" \
            --webdav-pass "${RCLONE_OBSCURE}" \
            --include "opskit.sh" --include "opskit.ps1" \
            :webdav:install/ \
            --transfers 2 --progress
          echo "[rclone] install scripts upload done"

      - name: generate SHA256 checksums
        run: |
          for f in artifacts/*/opskit-*; do
            [ -f "$f" ] || continue
            [[ "$f" == *.sha256 ]] && continue
            sha256sum "$f" | awk '{print $1, $2}'
          done
