# 智能源清单 — 按地区分组，mirror.py 根据 IP 归属地自动选择

# ─── Python / pip ─────────────────────────────────────────────────────────────
pip:
  cn:
    - url: https://mirrors.aliyun.com/pypi/simple/
      name: 阿里云
    - url: https://pypi.tuna.tsinghua.edu.cn/simple/
      name: 清华大学
    - url: https://mirrors.ustc.edu.cn/pypi/simple/
      name: 中科大
    - url: https://pypi.doubanio.com/simple/
      name: 豆瓣
  global:
    - url: https://pypi.org/simple/
      name: PyPI

# ─── Docker ──────────────────────────────────────────────────────────────────
docker:
  cn:
    - url: https://registry.cn-hangzhou.aliyuncs.com
      name: 阿里云容器镜像
    - url: https://hub-mirror.c.163.com
      name: 网易云
    - url: https://mirror.baidubce.com
      name: 百度云
  global:
    - url: https://registry-1.docker.io
      name: Docker Hub

# ─── apt（Ubuntu / Debian）───────────────────────────────────────────────────
apt:
  cn:
    - url: https://mirrors.aliyun.com
      name: 阿里云
    - url: https://mirrors.tuna.tsinghua.edu.cn
      name: 清华大学
    - url: https://mirrors.ustc.edu.cn
      name: 中科大
    - url: https://mirrors.163.com
      name: 网易
  global:
    - url: http://archive.ubuntu.com
      name: Ubuntu 官方

# ─── yum / dnf（CentOS / RHEL / Rocky / Alma）───────────────────────────────
yum:
  cn:
    - url: https://mirrors.aliyun.com/centos
      name: 阿里云
    - url: https://mirrors.tuna.tsinghua.edu.cn/centos
      name: 清华大学
    - url: https://mirrors.ustc.edu.cn/centos
      name: 中科大
  global:
    - url: https://vault.centos.org
      name: CentOS 官方

# ─── Homebrew（macOS）────────────────────────────────────────────────────────
brew:
  cn:
    - url: https://mirrors.aliyun.com/homebrew/homebrew-core.git
      name: 阿里云 Homebrew
    - url: https://mirrors.tuna.tsinghua.edu.cn/git/homebrew/homebrew-core.git
      name: 清华大学 Homebrew
  global:
    - url: https://github.com/Homebrew/homebrew-core
      name: Homebrew 官方

# ─── GitHub Releases 加速（OpsKit 自身更新）──────────────────────────────────
github_releases:
  cn:
    - url: https://mirror.ghproxy.com
      name: ghproxy
    - url: https://ghproxy.net
      name: ghproxy.net
    - url: https://gh.con.sh
      name: gh.con.sh
  global:
    - url: https://github.com
      name: GitHub 原生

# ─── 版本查询 API ────────────────────────────────────────────────────────────
version_api:
  github:
    cn:
      - url: https://mirror.ghproxy.com/https://api.github.com
        name: ghproxy
    global:
      - url: https://api.github.com
        name: GitHub API
  endoflife:
    global:
      - url: https://endoflife.date/api
        name: endoflife.date

# ─── 测速探针 URL（HEAD 请求，用于选最优源）──────────────────────────────────
probe:
  pip:
    path: /simple/
  docker:
    path: /v2/
  apt:
    path: /ubuntu/
  yum:
    path: /centos/
  brew:
    path: /
  github_releases:
    path: /XTLS/Xray-core/releases/latest
